<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#3b82f6">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>部门打卡</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:        #3b82f6;
      --blue-dark:   #2563eb;
      --blue-light:  #eff6ff;
      --blue-mid:    #bfdbfe;
      --green:       #16a34a;
      --green-light: #dcfce7;
      --green-mid:   #86efac;
      --red:         #dc2626;
      --red-light:   #fee2e2;
      --red-mid:     #fca5a5;
      --amber:       #d97706;
      --amber-light: #fef3c7;
      --indigo:      #4f46e5;
      --gray:        #6b7280;
      --gray-light:  #f3f4f6;
      --gray-border: #e5e7eb;
      --text:        #111827;
      --text-sec:    #6b7280;
      --white:       #ffffff;
      --shadow:      0 2px 10px rgba(0,0,0,0.07);
    }

    body {
      font-family: 'HarmonyOS Sans SC', 'Source Han Sans CN', system-ui,
                   -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-weight: 400;
      background: #f0f4f8;
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ─── 页面最大宽度容器 ─── */
    .page-wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 14px 14px 0;
    }

    /* ─── Header 卡片 ─── */
    .header-card {
      background: linear-gradient(145deg, #2563eb 0%, #3b82f6 100%);
      border-radius: 16px;
      padding: 14px 16px 16px;
      margin-bottom: 10px;
      text-align: center;
    }

    .header-card h1 {
      font-size: 19px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--white);
      margin-bottom: 12px;
    }

    .time-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .time-card {
      background: rgba(255,255,255,0.9);
      border-radius: 10px;
      padding: 8px 12px;
    }

    .t-label {
      font-size: 10px;
      color: rgba(30,58,138,0.65);
      margin-bottom: 3px;
    }

    .t-value {
      font-size: 16px;
      font-weight: 500;
      color: #1e3a8a;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
    }

    /* 时段徽章 */
    .period-badge {
      display: inline-block;
      margin-top: 12px;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      white-space: nowrap;
      transition: background 0.3s, color 0.3s;
    }

    .badge-loading  { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.85); }
    .badge-before   { background: var(--amber-light);     color: #92400e; }
    .badge-active   { background: var(--green-light);     color: #166534; }
    .badge-evening  { background: #ede9fe;                color: #4c1d95; }
    .badge-inactive { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.85); }
    .badge-done     { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.85); }
    .badge-weekend  { background: #f3e8ff;                color: #581c87; }

    /* ─── 通用卡片 ─── */
    .card {
      background: var(--white);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-sec);
      margin-bottom: 10px;
    }

    /* ─── 编号下拉 ─── */
    .select-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .select-wrap select {
      width: 100%;
      padding: 11px 38px 11px 14px;
      font-size: 18px;
      font-weight: 500;
      border: 1.5px solid var(--gray-border);
      border-radius: 8px;
      background: var(--white);
      color: var(--text);
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .select-wrap select:focus { border-color: var(--blue); }

    .select-arrow {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--gray);
      font-size: 13px;
    }

    /* ─── 打卡按钮 ─── */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-clk {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 14px 8px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .btn-clk:active:not(:disabled) { transform: scale(0.97); }

    .btn-clk .btn-icon { font-size: 22px; line-height: 1; }
    .btn-clk .btn-sub  { font-size: 11px; font-weight: 400; min-height: 14px; opacity: 0.9; }

    /* 未开始 / 已结束（disabled, not done） */
    .btn-clk:disabled:not(.btn-done) {
      background: var(--gray-light) !important;
      color: #9ca3af !important;
      cursor: not-allowed;
      opacity: 0.65;
    }

    /* 已打卡（done） */
    .btn-clk.btn-done {
      background: var(--green-light) !important;
      color: #15803d !important;
      cursor: default;
    }

    /* 上午：进行中（enabled, not done） */
    .btn-morning:not(:disabled):not(.btn-done) {
      background: linear-gradient(135deg, #fbbf24, var(--amber));
      color: var(--white);
      animation: breathe-warm 2.2s ease-in-out infinite;
    }

    /* 晚上：进行中（enabled, not done） */
    .btn-evening:not(:disabled):not(.btn-done) {
      background: linear-gradient(135deg, #818cf8, var(--indigo));
      color: var(--white);
      animation: breathe-cool 2.2s ease-in-out infinite;
    }

    @keyframes breathe-warm {
      0%, 100% { box-shadow: 0 0 0 0 rgba(217,119,6,0.35); }
      50%       { box-shadow: 0 0 0 7px rgba(217,119,6,0); }
    }

    @keyframes breathe-cool {
      0%, 100% { box-shadow: 0 0 0 0 rgba(79,70,229,0.35); }
      50%       { box-shadow: 0 0 0 7px rgba(79,70,229,0); }
    }

    /* ─── 通知条 ─── */
    .notif {
      margin: 0 0 10px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      animation: slideDown 0.25s ease;
    }

    .notif.success { background: var(--green-light); color: #15803d; border: 1px solid var(--green-mid); }
    .notif.error   { background: var(--red-light);   color: #b91c1c; border: 1px solid var(--red-mid); }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── 状态总览区 ─── */
    .section-wrap { margin-bottom: 0; }

    .section-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .section-head h2 { font-size: 14px; font-weight: 500; }
    .section-head .sub { font-size: 11px; color: var(--text-sec); }

    /* 本周按钮 */
    .btn-week {
      margin-left: auto;
      padding: 4px 12px;
      background: var(--blue-light);
      color: var(--blue);
      border: 1px solid var(--blue-mid);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .btn-week:active { opacity: 0.75; }

    /* ─── 通知区域 ─── */
    .notif-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--gray-border);
      gap: 10px;
    }
    .notif-desc {
      font-size: 12px;
      color: var(--text-sec);
      flex: 1;
      line-height: 1.5;
    }
    .btn-notif {
      flex-shrink: 0;
      padding: 7px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn-notif:active { opacity: 0.75; }
    .btn-notif-on  { background: var(--blue-light); color: var(--blue); border: 1px solid var(--blue-mid); }
    .btn-notif-off { background: var(--gray-light);  color: var(--text-sec); }
    .btn-notif-ok  { background: var(--green-light); color: #15803d; cursor: default; }

    /* 切换编号入口 */
    .code-hint {
      font-size: 11px;
      color: var(--text-sec);
      margin-top: 6px;
      text-align: right;
    }
    .code-hint button {
      background: none;
      border: none;
      color: var(--blue);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      text-decoration: underline;
    }

    .day-section-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-sec);
      margin-bottom: 8px;
    }

    /* 统计摘要 */
    .summary-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .summary-item {
      background: var(--white);
      border-radius: 10px;
      padding: 10px 14px;
      box-shadow: var(--shadow);
    }

    .s-count {
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
    }

    .s-count .s-total {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-sec);
    }

    .s-label { font-size: 11px; color: var(--text-sec); margin-top: 2px; }

    /* 打卡列表 */
    .status-table {
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-border);
    }

    .tbl-head {
      display: grid;
      grid-template-columns: 64px 1fr 1fr;
      background: #f8fafc;
      border-bottom: 1px solid var(--gray-border);
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-sec);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .tbl-row {
      display: grid;
      grid-template-columns: 64px 1fr 1fr;
      padding: 11px 14px;
      border-bottom: 1px solid #f3f4f6;
      align-items: center;
      transition: background 0.12s;
    }

    .tbl-row:last-child { border-bottom: none; }
    .tbl-row:nth-child(even) { background: #fafafa; }
    .tbl-row:hover { background: #f0f4ff; }
    .tbl-row.is-me { background: #eff6ff !important; }
    .tbl-row.is-me:hover { background: #dbeafe !important; }

    .cell-code {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .cell-code .me-tag {
      display: block;
      font-size: 10px;
      font-weight: 400;
      color: var(--blue);
      margin-top: 1px;
    }

    .cell-status { font-size: 13px; }

    /* 已打卡：绿色对勾 */
    .st-ok {
      display: inline-flex;
      flex-direction: column;
      color: var(--green);
      font-weight: 500;
    }

    .st-ok-mark { font-size: 15px; line-height: 1; }
    .st-time    { font-size: 10px; color: #15803d; margin-top: 1px;
                  font-variant-numeric: tabular-nums; }

    /* 未打卡：灰色虚线圆点 */
    .st-dot {
      display: inline-block;
      width: 14px; height: 14px;
      border: 1.5px dashed #d1d5db;
      border-radius: 50%;
      vertical-align: middle;
    }

    /* 加载占位 */
    .loading-row {
      padding: 32px;
      text-align: center;
      color: var(--text-sec);
      font-size: 13px;
    }

    /* ─── 本周弹窗内容 ─── */
    .week-day {
      border: 1px solid var(--gray-border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .week-day:last-child { margin-bottom: 0; }

    .week-day-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f8fafc;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
    }

    .today-tag {
      font-size: 11px;
      background: var(--blue);
      color: var(--white);
      border-radius: 10px;
      padding: 2px 9px;
      font-weight: 500;
    }

    .week-session {
      padding: 8px 14px;
      border-top: 1px solid #f3f4f6;
    }

    .week-session-label {
      font-size: 11px;
      color: var(--text-sec);
      margin-bottom: 3px;
    }

    .week-count { font-size: 14px; font-weight: 500; }
    .week-count.all-ok  { color: var(--green); }
    .week-count.partial { color: var(--amber); }
    .week-count.pending { color: var(--text-sec); font-size: 12px; }

    .week-absent-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 5px;
    }

    .week-chip {
      background: var(--red-light);
      color: #b91c1c;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 500;
    }

    /* ─── 底部状态栏 ─── */
    .footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-top: 1px solid var(--gray-border);
      z-index: 50;
    }

    .footer-inner {
      max-width: 640px;
      margin: 0 auto;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-sec);
    }

    .pulse-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 5px;
      vertical-align: middle;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.2; transform: scale(0.75); }
    }

    .countdown { font-variant-numeric: tabular-nums; }

    /* ─── 弹窗 ─── */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-bg.open { display: flex; animation: fadeIn 0.2s; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-box {
      background: var(--white);
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 380px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .modal-subtitle {
      font-size: 12px;
      color: var(--text-sec);
      margin-bottom: 14px;
    }

    .absent-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .absent-chip {
      background: var(--red-light);
      color: #b91c1c;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
    }

    .modal-all-ok {
      color: var(--green);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 18px;
    }

    .btn-close {
      width: 100%;
      padding: 13px;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-close:active { opacity: 0.85; }
  </style>
</head>
<body>

<div class="page-wrap">

  <!-- ══════════ Header 卡片 ══════════ -->
  <div class="header-card">
    <h1>部门打卡</h1>
    <div class="time-grid">
      <div class="time-card">
        <div class="t-label">日期 &amp; 星期</div>
        <div class="t-value" id="dateDisplay">···</div>
      </div>
      <div class="time-card">
        <div class="t-label">服务器时间（北京）</div>
        <div class="t-value" id="clockDisplay">--:--:--</div>
      </div>
    </div>
    <span class="period-badge badge-loading" id="periodBadge">连接中…</span>
  </div>

  <!-- ══════════ 打卡区 ══════════ -->
  <div class="card">
    <div class="card-title">选择我的编号</div>
    <div class="select-wrap">
      <select id="codeSelect">
        <option value="">-- 请选择编号 --</option>
      </select>
      <span class="select-arrow">▾</span>
    </div>
    <div class="btn-row">
      <button class="btn-clk btn-morning" id="btnMorning" onclick="doCheckin('morning')" disabled>
        <span class="btn-icon">☀️</span>
        <span>上午打卡</span>
        <span class="btn-sub" id="subMorning">06:00–09:30</span>
      </button>
      <button class="btn-clk btn-evening" id="btnEvening" onclick="doCheckin('evening')" disabled>
        <span class="btn-icon">🌙</span>
        <span>晚上打卡</span>
        <span class="btn-sub" id="subEvening">20:30–22:00</span>
      </button>
    </div>
    <div class="code-hint" id="codeHint" style="display:none">
      已记住编号 <strong id="codeHintNum"></strong> &nbsp;
      <button onclick="switchCode()">切换编号</button>
    </div>
    <div class="notif-row" id="notifRow" style="display:none">
      <span class="notif-desc">🔔 开启提醒后，打卡截止前 15 分钟自动推送通知（需已添加到桌面并允许通知）</span>
      <button class="btn-notif btn-notif-on" id="btnPush" onclick="togglePush()">开启提醒</button>
    </div>
  </div>

  <!-- ══════════ 通知条 ══════════ -->
  <div class="notif" id="notif"></div>

  <!-- ══════════ 统计 + 状态列表 ══════════ -->
  <div class="section-wrap">
    <div class="section-head">
      <h2>今日打卡状态</h2>
      <span class="sub" id="refreshSub">每 30 秒自动刷新</span>
      <button class="btn-week" onclick="openDayModal()">📋 本日</button>
      <button class="btn-week" onclick="openWeekModal()">📅 本周</button>
    </div>

    <div class="summary-bar">
      <div class="summary-item">
        <div class="s-count">
          <span id="statMorningOk">-</span><span class="s-total"> / 21 人</span>
        </div>
        <div class="s-label">上午已打卡</div>
      </div>
      <div class="summary-item">
        <div class="s-count">
          <span id="statEveningOk">-</span><span class="s-total"> / 21 人</span>
        </div>
        <div class="s-label">晚上已打卡</div>
      </div>
    </div>

    <div class="status-table">
      <div class="tbl-head">
        <span>编号</span>
        <span>☀️ 上午</span>
        <span>🌙 晚上</span>
      </div>
      <div id="statusBody">
        <div class="loading-row">加载中…</div>
      </div>
    </div>
  </div>

</div><!-- /page-wrap -->

<!-- ══════════ 底部状态栏 ══════════ -->
<div class="footer">
  <div class="footer-inner">
    <span><span class="pulse-dot"></span>实时同步中</span>
    <span id="footerRight"><span class="countdown" id="countdownEl">30</span>s 后刷新</span>
  </div>
</div>

<!-- ══════════ 缺卡弹窗 ══════════ -->
<div class="modal-bg" id="modalBg" onclick="onBgClick(event)">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">缺卡提醒</div>
    <div class="modal-subtitle" id="modalSubtitle"></div>
    <div id="modalContent"></div>
    <button class="btn-close" onclick="closeModal()">我知道了</button>
  </div>
</div>

<!-- ══════════ 本周弹窗 ══════════ -->
<div class="modal-bg" id="weekModalBg" onclick="onWeekBgClick(event)">
  <div class="modal-box">
    <div class="modal-title">📅 本周打卡情况</div>
    <div class="modal-subtitle" id="weekSubtitle"></div>
    <div id="weekContent"><div class="loading-row">加载中…</div></div>
    <button class="btn-close" onclick="closeWeekModal()" style="margin-top:16px">关闭</button>
  </div>
</div>

<script>
'use strict';

/* ─── 常量 ─── */
const CODES = [
  '864','332','486','748','862','065','943','292','431','995',
  '815','477','134','498','344','366','976','101','883','462','320'
];
const REFRESH_INTERVAL = 30;

/* ─── 状态 ─── */
let currentData    = null;
let selectedCode   = '';
let countdown      = REFRESH_INTERVAL;
let countdownTimer = null;
let srvBaseMs      = 0;
let localBaseMs    = 0;
let clockTicking   = false;

/* ─── 初始化编号下拉 ─── */
(function initSelect() {
  const sel = document.getElementById('codeSelect');
  CODES.forEach(c => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = c;
    sel.appendChild(opt);
  });
  const saved = localStorage.getItem('checkin_code');
  if (saved && CODES.includes(saved)) {
    sel.value = selectedCode = saved;
  }
  sel.addEventListener('change', () => {
    selectedCode = sel.value;
    if (selectedCode) localStorage.setItem('checkin_code', selectedCode);
    updateButtons();
    renderList();
    updateCodeHint();
  });
})();

/* ─── 拉取状态 ─── */
async function fetchStatus() {
  try {
    const res = await fetch('/api/status');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    currentData = data;
    syncClock(data.server_time, data.date);
    renderHeader(data);
    renderList();
    renderSummary();
    updateButtons();

    document.getElementById('refreshSub').textContent = '每 30 秒自动刷新';
  } catch (e) {
    document.getElementById('refreshSub').textContent = '刷新失败，重试中…';
    console.error('fetchStatus error:', e);
  }
}

/* ─── 本地时钟同步 ─── */
function syncClock(serverTimeStr, serverDateStr) {
  const [h, m, s] = serverTimeStr.split(':').map(Number);
  const [y, mo, d] = serverDateStr.split('-').map(Number);
  srvBaseMs   = Date.UTC(y, mo - 1, d, h - 8, m, s);
  localBaseMs = Date.now();
  if (!clockTicking) {
    clockTicking = true;
    setInterval(tickClock, 1000);
  }
}

function tickClock() {
  if (!srvBaseMs) return;
  const elapsed = Date.now() - localBaseMs;
  const utc8    = new Date(srvBaseMs + elapsed + 8 * 3600 * 1000);
  const hh = String(utc8.getUTCHours()).padStart(2, '0');
  const mm = String(utc8.getUTCMinutes()).padStart(2, '0');
  const ss = String(utc8.getUTCSeconds()).padStart(2, '0');
  document.getElementById('clockDisplay').textContent = `${hh}:${mm}:${ss}`;
}

/* ─── 渲染 Header ─── */
const PERIOD_INFO = {
  before_morning: { text: '⏳ 上午打卡未开始（06:00 起）', cls: 'badge-before'   },
  morning:        { text: '☀️ 上午打卡时段（06:00–09:30）', cls: 'badge-active'   },
  between:        { text: '💤 非打卡时段',                  cls: 'badge-inactive' },
  evening:        { text: '🌙 晚上打卡时段（20:30–22:00）', cls: 'badge-evening'  },
  after_evening:  { text: '✅ 今日打卡已结束',              cls: 'badge-done'     },
  none:           { text: '🏖️ 今日为周末，无需打卡',         cls: 'badge-weekend'  },
};

function renderHeader(data) {
  const dateShort = data.date.slice(5).replace('-', '/');
  document.getElementById('dateDisplay').textContent = `${dateShort} ${data.day_of_week}`;

  const badge = document.getElementById('periodBadge');
  const info  = PERIOD_INFO[data.period] ?? { text: data.period, cls: 'badge-inactive' };
  badge.textContent = info.text;
  badge.className   = `period-badge ${info.cls}`;
}

/* ─── 渲染打卡列表 ─── */
function renderList() {
  const body = document.getElementById('statusBody');
  if (!currentData) return;

  body.innerHTML = currentData.status_list.map(item => {
    const isMe = item.code === selectedCode;
    const mHtml = item.morning_time
      ? `<span class="st-ok"><span class="st-ok-mark">✓</span><span class="st-time">${item.morning_time}</span></span>`
      : `<span class="st-dot"></span>`;
    const eHtml = item.evening_time
      ? `<span class="st-ok"><span class="st-ok-mark">✓</span><span class="st-time">${item.evening_time}</span></span>`
      : `<span class="st-dot"></span>`;
    return `
      <div class="tbl-row${isMe ? ' is-me' : ''}">
        <span class="cell-code">${item.code}${isMe ? '<span class="me-tag">▶ 我</span>' : ''}</span>
        <span class="cell-status">${mHtml}</span>
        <span class="cell-status">${eHtml}</span>
      </div>`;
  }).join('');
}

/* ─── 渲染统计摘要 ─── */
function renderSummary() {
  if (!currentData) return;
  const list = currentData.status_list;
  document.getElementById('statMorningOk').textContent =
    list.filter(r => r.morning_time).length;
  document.getElementById('statEveningOk').textContent =
    list.filter(r => r.evening_time).length;
}

/* ─── 更新打卡按钮状态 ─── */
function updateButtons() {
  const btnM = document.getElementById('btnMorning');
  const btnE = document.getElementById('btnEvening');
  const subM = document.getElementById('subMorning');
  const subE = document.getElementById('subEvening');

  [btnM, btnE].forEach(b => { b.classList.remove('btn-done'); b.disabled = true; });
  subM.textContent = '06:00–09:30';
  subE.textContent = '20:30–22:00';

  if (!selectedCode || !currentData) return;

  const { period, is_weekend, status_list } = currentData;
  const mine = status_list.find(r => r.code === selectedCode);

  if (is_weekend) {
    subM.textContent = subE.textContent = '周末无需打卡';
    return;
  }

  // ── 上午按钮 ──
  if (mine?.morning_time) {
    btnM.disabled = true;
    btnM.classList.add('btn-done');
    subM.textContent = '· ' + mine.morning_time;
  } else if (period === 'morning') {
    btnM.disabled = false;
    subM.textContent = '· 进行中';
  } else if (period === 'before_morning') {
    subM.textContent = '· 未开始';
  } else {
    subM.textContent = '· 已结束';
  }

  // ── 晚上按钮 ──
  if (mine?.evening_time) {
    btnE.disabled = true;
    btnE.classList.add('btn-done');
    subE.textContent = '· ' + mine.evening_time;
  } else if (period === 'evening') {
    btnE.disabled = false;
    subE.textContent = '· 进行中';
  } else if (['before_morning', 'morning', 'between'].includes(period)) {
    subE.textContent = '· 未开始';
  } else {
    subE.textContent = '· 已结束';
  }
}

/* ─── 打卡动作 ─── */
async function doCheckin(period) {
  if (!selectedCode) {
    showNotif('请先选择您的编号', 'error'); return;
  }

  const btn = period === 'morning'
    ? document.getElementById('btnMorning')
    : document.getElementById('btnEvening');

  btn.disabled = true;

  try {
    const res = await fetch('/api/checkin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: selectedCode, period }),
    });
    const data = await res.json();

    if (data.success) {
      showNotif('✅ ' + data.message, 'success');
      await fetchStatus();
    } else {
      showNotif('❌ ' + data.message, 'error');
      updateButtons();
    }
  } catch {
    showNotif('⚠️ 网络异常，请重试', 'error');
    updateButtons();
  }
}

/* ─── 通知条 ─── */
let notifTimer = null;
function showNotif(msg, type) {
  const el = document.getElementById('notif');
  el.textContent   = msg;
  el.className     = `notif ${type}`;
  el.style.display = 'block';
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => { el.style.display = 'none'; }, 4500);
}

/* ─── 本日缺卡弹窗 ─── */
function openDayModal() {
  if (!currentData) { showNotif('数据加载中，请稍候', 'error'); return; }
  renderDayModal(currentData);
  document.getElementById('modalBg').classList.add('open');
}

function renderDayModal(data) {
  const { date, day_of_week, status_list, period, is_weekend } = data;
  const dateShort = date.slice(5).replace('-', '/');

  document.getElementById('modalTitle').textContent    = '本日打卡情况';
  document.getElementById('modalSubtitle').textContent = `${dateShort} ${day_of_week}`;

  if (is_weekend) {
    document.getElementById('modalContent').innerHTML =
      '<div class="modal-all-ok">🏖️ 今日为周末，无需打卡</div>';
    return;
  }

  const morningAbsent = status_list.filter(r => !r.morning_time).map(r => r.code);
  const eveningAbsent = status_list.filter(r => !r.evening_time).map(r => r.code);

  const chipsHtml = codes =>
    `<div class="absent-chips">${codes.map(c => `<span class="absent-chip">${c}</span>`).join('')}</div>`;

  const pending = txt =>
    `<p style="font-size:13px;color:var(--text-sec);margin-bottom:16px">${txt}</p>`;

  // 上午：时段结束后（between / evening / after_evening）才显示缺卡
  let mHtml;
  if (['before_morning','morning'].includes(period)) {
    mHtml = pending('打卡时段尚未结束（09:30 截止）');
  } else if (morningAbsent.length === 0) {
    mHtml = '<div class="modal-all-ok">🎉 全员已打卡</div>';
  } else {
    mHtml = chipsHtml(morningAbsent);
  }

  // 晚上：时段结束后（after_evening）才显示缺卡
  let eHtml;
  if (['before_morning','morning','between'].includes(period)) {
    eHtml = pending('打卡时段未到（20:30 开始）');
  } else if (period === 'evening') {
    eHtml = pending('打卡时段进行中（22:00 截止）');
  } else if (eveningAbsent.length === 0) {
    eHtml = '<div class="modal-all-ok">🎉 全员已打卡</div>';
  } else {
    eHtml = chipsHtml(eveningAbsent);
  }

  document.getElementById('modalContent').innerHTML =
    `<div class="day-section-label">☀️ 上午缺卡</div>${mHtml}` +
    `<div class="day-section-label" style="margin-top:14px">🌙 晚上缺卡</div>${eHtml}`;
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
}

function onBgClick(e) {
  if (e.target === document.getElementById('modalBg')) closeModal();
}

/* ─── 倒计时 + 自动刷新 ─── */
function startCountdown() {
  countdown = REFRESH_INTERVAL;
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdown--;
    document.getElementById('countdownEl').textContent = countdown;
    if (countdown <= 0) {
      countdown = REFRESH_INTERVAL;
      fetchStatus().then(() => {
        document.getElementById('countdownEl').textContent = REFRESH_INTERVAL;
      });
    }
  }, 1000);
}

/* ─── 本周弹窗 ─── */
async function openWeekModal() {
  document.getElementById('weekModalBg').classList.add('open');
  document.getElementById('weekContent').innerHTML = '<div class="loading-row">加载中…</div>';
  document.getElementById('weekSubtitle').textContent = '';
  try {
    const res = await fetch('/api/weekly');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    renderWeekly(await res.json());
  } catch {
    document.getElementById('weekContent').innerHTML = '<div class="loading-row">加载失败，请重试</div>';
  }
}

function closeWeekModal() {
  document.getElementById('weekModalBg').classList.remove('open');
}

function onWeekBgClick(e) {
  if (e.target === document.getElementById('weekModalBg')) closeWeekModal();
}

function renderWeekly({ days, total }) {
  if (!days.length) {
    document.getElementById('weekContent').innerHTML = '<div class="loading-row">本周暂无数据</div>';
    return;
  }

  const first = days[0].date.slice(5).replace('-', '/');
  const last  = days[days.length - 1].date.slice(5).replace('-', '/');
  document.getElementById('weekSubtitle').textContent = `本周 ${first} — ${last}`;

  const period = currentData?.period ?? '';

  const weekPending = txt => `<span class="week-count pending">${txt}</span>`;

  const weekCount = (count, absent) => {
    const cls   = count === total ? 'all-ok' : 'partial';
    const text  = `${count}/${total}${count === total ? ' 🎉' : ''}`;
    const chips = absent.length
      ? `<div class="week-absent-wrap">${absent.map(c =>
          `<span class="week-chip">${c}</span>`).join('')}</div>` : '';
    return `<span class="week-count ${cls}">${text}</span>${chips}`;
  };

  document.getElementById('weekContent').innerHTML = days.map(d => {
    const dateShort = d.date.slice(5).replace('-', '/');
    const todayTag  = d.is_today ? '<span class="today-tag">今日</span>' : '';

    // 上午：今日时段未结束时不显示缺卡
    const mHtml = d.is_today && ['before_morning','morning'].includes(period)
      ? weekPending('打卡时段尚未结束（09:30 截止）')
      : weekCount(d.morning_count, d.morning_absent);

    // 晚上：今日时段未结束时不显示缺卡
    let eHtml;
    if (d.is_today && ['before_morning','morning','between'].includes(period)) {
      eHtml = weekPending('打卡时段未到（20:30 开始）');
    } else if (d.is_today && period === 'evening') {
      eHtml = weekPending('打卡时段进行中（22:00 截止）');
    } else {
      eHtml = weekCount(d.evening_count, d.evening_absent);
    }

    return `
      <div class="week-day">
        <div class="week-day-head">
          <span>${d.day_name} ${dateShort}</span>${todayTag}
        </div>
        <div class="week-session">
          <div class="week-session-label">☀️ 上午打卡</div>
          ${mHtml}
        </div>
        <div class="week-session">
          <div class="week-session-label">🌙 晚上打卡</div>
          ${eHtml}
        </div>
      </div>`;
  }).join('');
}

/* ─── PWA：注册 Service Worker ─── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(console.error);
}

/* ─── 固定编号 & 通知行 ─── */
function updateCodeHint() {
  const hint = document.getElementById('codeHint');
  const num  = document.getElementById('codeHintNum');
  if (selectedCode) {
    hint.style.display = 'block';
    num.textContent = selectedCode;
    document.getElementById('notifRow').style.display = 'flex';
    refreshPushButtonState();
  } else {
    hint.style.display = 'none';
    document.getElementById('notifRow').style.display = 'none';
  }
}

function switchCode() {
  // 显示下拉框让用户重新选择
  const sel = document.getElementById('codeSelect');
  sel.value = '';
  selectedCode = '';
  sel.parentElement.style.display = 'block';
  updateCodeHint();
  sel.focus();
}

/* ─── Web Push ─── */
let vapidPublicKey = null;

async function getVapidKey() {
  if (vapidPublicKey) return vapidPublicKey;
  try {
    const r = await fetch('/api/vapid-key');
    if (!r.ok) return null;
    const { publicKey } = await r.json();
    vapidPublicKey = publicKey;
    return publicKey;
  } catch { return null; }
}

function b64uToUint8(b64u) {
  b64u = b64u.replace(/-/g, '+').replace(/_/g, '/');
  while (b64u.length % 4) b64u += '=';
  return Uint8Array.from(atob(b64u), c => c.charCodeAt(0));
}

function refreshPushButtonState() {
  const btn = document.getElementById('btnPush');

  // 非 HTTPS / localhost 环境，Push API 不可用
  if (!window.isSecureContext) {
    btn.textContent = '需 HTTPS 才能开启';
    btn.className = 'btn-notif btn-notif-off';
    btn.disabled = true;
    return;
  }

  // iOS Safari 浏览器（未安装为 PWA）没有 PushManager
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent.toLowerCase());
  const isInstalled = window.navigator.standalone === true
    || window.matchMedia('(display-mode: standalone)').matches;

  if (!('Notification' in window) || !('PushManager' in window)) {
    if (isIOS && !isInstalled) {
      btn.textContent = '请先添加到主屏幕';
      btn.className = 'btn-notif btn-notif-on';
      btn.disabled = false;
      btn.onclick = () => showNotif(
        '请点击 Safari 底部分享按钮 → "添加到主屏幕"，再从桌面图标打开即可开启提醒', 'success'
      );
    } else {
      btn.textContent = '浏览器不支持推送';
      btn.className = 'btn-notif btn-notif-off';
      btn.disabled = true;
    }
    return;
  }

  if (Notification.permission === 'denied') {
    btn.textContent = '通知权限已拒绝';
    btn.className = 'btn-notif btn-notif-off';
    btn.disabled = true;
    return;
  }
  // 检查本地是否已订阅
  if (localStorage.getItem('push_subscribed') === selectedCode) {
    btn.textContent = '✅ 提醒已开启';
    btn.className = 'btn-notif btn-notif-ok';
    btn.disabled = false;
    btn.onclick = cancelPush;
  } else {
    btn.textContent = '🔔 开启提醒';
    btn.className = 'btn-notif btn-notif-on';
    btn.disabled = false;
    btn.onclick = togglePush;
  }
}

async function togglePush() {
  if (!selectedCode) { showNotif('请先选择编号', 'error'); return; }
  const pubKey = await getVapidKey();
  if (!pubKey) { showNotif('服务端未配置推送，请联系管理员', 'error'); return; }

  let perm = Notification.permission;
  if (perm === 'default') perm = await Notification.requestPermission();
  if (perm !== 'granted') { showNotif('请在浏览器设置中允许通知权限', 'error'); return; }

  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: b64uToUint8(pubKey),
    });
    await fetch('/api/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: selectedCode, subscription: sub.toJSON() }),
    });
    localStorage.setItem('push_subscribed', selectedCode);
    showNotif('✅ 打卡提醒已开启', 'success');
    refreshPushButtonState();
  } catch (e) {
    console.error(e);
    showNotif('订阅失败：' + e.message, 'error');
  }
}

async function cancelPush() {
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (sub) await sub.unsubscribe();
    await fetch('/api/subscribe', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: selectedCode }),
    });
    localStorage.removeItem('push_subscribed');
    showNotif('提醒已关闭', 'success');
    refreshPushButtonState();
  } catch (e) {
    showNotif('取消失败：' + e.message, 'error');
  }
}

/* ─── 启动 ─── */
updateCodeHint();
fetchStatus().then(startCountdown);
</script>
